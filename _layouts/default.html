<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .site-header { margin-bottom: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 1rem; }
    .site-footer { margin-top: 3rem; border-top: 1px solid #ccc; padding-top: 1rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div class="site-header">
    <strong><a href="/">{{ site.title }}</a></strong> — {{ site.description }}
  </div>
  <main>
    {{ content }}
  </main>
  <div class="site-footer">
    <a href="/">← На главную</a>
  </div>
</body>
</html>
